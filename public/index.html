<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pi Network - Testnet Payment</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
  <div id="app">
    <h1>Pi Network Testnet</h1>
    <div id="login-section">
      <button id="login-btn">🔐 Login with Pi</button>
    </div>
    <div id="user-section" class="hidden">
      <p id="user-info"></p>
      <button id="logout-btn">Logout</button>
    </div>
    <div id="payment-section" class="hidden">
      <h2>Send Test-π</h2>
      <input type="number" id="amount" placeholder="Amount (π)" min="0.01" step="0.01">
      <input type="text" id="memo" placeholder="Memo">
      <button id="pay-btn">💳 Pay with Pi</button>
    </div>
    <div id="status"></div>
  </div>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/payment.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
